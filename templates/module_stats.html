<div class="stats" data-stats data-guild="{{ guild_id }}">
  <p class="muted">Live server stats and bot gateway latency.</p>
  <div class="stat"><span>Members</span><strong data-stat="member_count">{{ stats.member_count }}</strong></div>
  <div class="stat"><span>Online</span><strong data-stat="online_count">{{ stats.online_count }}</strong></div>
  <div class="stat"><span>Boost Level</span><strong data-stat="boost_level">{{ stats.boost_level }}</strong></div>
  <div class="stat"><span>Bot Latency</span><strong data-stat="latency_ms">{{ stats.latency_ms }} ms</strong></div>
</div>
